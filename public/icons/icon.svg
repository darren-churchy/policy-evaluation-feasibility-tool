<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#9C1B6D"/>
  <!-- Scales of justice simplified -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central post -->
    <line x1="256" y1="120" x2="256" y2="390" stroke-width="22"/>
    <!-- Base -->
    <line x1="176" y1="390" x2="336" y2="390" stroke-width="22"/>
    <!-- Crossbeam -->
    <line x1="130" y1="185" x2="382" y2="185" stroke-width="22"/>
    <!-- Left chain -->
    <line x1="152" y1="185" x2="152" y2="270" stroke-width="14"/>
    <!-- Right chain -->
    <line x1="360" y1="185" x2="360" y2="255" stroke-width="14"/>
    <!-- Left pan -->
    <path d="M112 270 Q152 300 192 270" stroke-width="18" fill="rgba(255,255,255,0.15)"/>
    <!-- Right pan -->
    <path d="M320 255 Q360 285 400 255" stroke-width="18" fill="rgba(255,255,255,0.15)"/>
    <!-- Top knob -->
    <circle cx="256" cy="118" r="18" fill="#ffffff" stroke="none"/>
  </g>
</svg>
